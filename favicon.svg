@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@500;600;700&display=swap');
:root{--green:#173f35;--green2:#285a49;--sage:#8aa189;--cream:#f4f1e8;--paper:#fbfaf5;--gold:#cfaa6c;--ink:#1c2823;--muted:#68756e;--line:#dfe3d8;--shadow:0 24px 60px rgba(19,54,44,.13)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:var(--paper);line-height:1.75}img,svg{display:block;max-width:100%}a{color:inherit;text-decoration:none}.container{width:min(1180px,calc(100% - 40px));margin:auto}.skip-link{position:absolute;left:-9999px}.skip-link:focus{left:20px;top:20px;background:#fff;padding:12px;z-index:9999}.site-header{position:fixed;inset:0 0 auto;z-index:100;background:rgba(251,250,245,.86);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.35)}.header-inner{height:84px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:13px}.brand-mark{width:46px;height:46px;border:1px solid var(--green);border-radius:50%;display:grid;place-items:center}.brand-mark svg{width:30px;height:30px;fill:none;stroke:var(--green);stroke-width:2}.brand strong{display:block;font-family:'Noto Serif KR';font-size:20px}.brand small{display:block;font-size:9px;letter-spacing:.14em;color:var(--muted)}.main-nav{display:flex;align-items:center;gap:28px;font-size:14px;font-weight:500}.main-nav a{position:relative}.main-nav a:not(.nav-cta):after{content:"";position:absolute;left:0;bottom:-8px;width:0;height:1px;background:var(--green);transition:.25s}.main-nav a:hover:after{width:100%}.nav-cta{padding:11px 18px;background:var(--green);color:#fff;border-radius:999px}.menu-toggle{display:none;background:none;border:0;padding:8px}.menu-toggle span{display:block;width:24px;height:2px;background:var(--green);margin:5px}.section{padding:120px 0}.section-dark{color:#fff;background:var(--green)}.hero{min-height:900px;position:relative;display:flex;align-items:center;overflow:hidden}.hero-art,.hero-overlay{position:absolute;inset:0}.hero-art svg{width:100%;height:100%}.hero-overlay{background:linear-gradient(90deg,rgba(10,40,32,.86) 0%,rgba(10,40,32,.62) 46%,rgba(10,40,32,.08) 75%)}.hero-content{position:relative;z-index:1;padding-top:90px}.eyebrow{font-size:12px;font-weight:700;letter-spacing:.22em;color:var(--gold);margin:0 0 20px}.hero h1,.section-heading h2,.feature-copy h2,.visit-copy h2,.cta-inner h2{font-family:'Noto Serif KR';font-weight:600;line-height:1.25;margin:0}.hero h1{font-size:clamp(54px,7.3vw,96px);letter-spacing:-.05em}.hero h1 em{font-style:normal;color:#e1c795}.hero-copy{font-size:18px;color:rgba(255,255,255,.82);margin:28px 0 36px}.hero-actions,.visit-actions,.cta-actions{display:flex;gap:12px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:0 24px;border-radius:999px;font-weight:700;border:1px solid transparent;transition:.25s}.btn:hover{transform:translateY(-2px)}.btn-primary{background:var(--gold);color:#17372f}.btn-ghost{border-color:rgba(255,255,255,.55);color:#fff}.btn-outline{border-color:var(--green);color:var(--green)}.btn-light{background:#fff;color:var(--green)}.hero-points{list-style:none;padding:0;margin:70px 0 0;display:flex;gap:0;width:min(760px,100%);border-top:1px solid rgba(255,255,255,.25)}.hero-points li{flex:1;padding:22px 24px 0 0}.hero-points strong,.hero-points span{display:block}.hero-points strong{font-family:'Noto Serif KR';font-size:18px}.hero-points span{font-size:12px;color:rgba(255,255,255,.62);margin-top:3px}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:start}.section-heading h2,.feature-copy h2,.visit-copy h2{font-size:clamp(38px,5vw,62px);letter-spacing:-.04em}.intro-copy{font-size:18px;color:#536159}.intro-copy p{margin-top:0}.text-link{display:inline-flex;gap:12px;color:var(--green);font-weight:700;margin-top:14px}.text-link span{transition:.25s}.text-link:hover span{transform:translateX(5px)}.feature-section{background:#eef0e7}.feature-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:80px;align-items:center}.feature-visual{border-radius:38px;overflow:hidden;box-shadow:var(--shadow)}.feature-copy .lead{font-size:18px;color:#536159}.benefit-list{margin-top:36px}.benefit-list article{display:grid;grid-template-columns:48px 1fr;gap:18px;padding:22px 0;border-top:1px solid #cad2c6}.benefit-list span{font-family:'Noto Serif KR';color:var(--gold);font-weight:700}.benefit-list h3{margin:0 0 4px;font-size:18px}.benefit-list p{margin:0;color:#66726c;font-size:14px}.notice{font-size:12px;color:#7a837e}.centered{text-align:center;max-width:760px;margin:0 auto 56px}.centered>p:last-child{color:var(--muted)}.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.program-card{position:relative;padding:36px 30px 32px;background:#fff;border:1px solid var(--line);border-radius:24px;min-height:300px;transition:.3s}.program-card:hover{transform:translateY(-8px);box-shadow:var(--shadow)}.program-card .icon{font-size:31px}.program-card .num{font-size:11px;letter-spacing:.15em;color:var(--gold);margin-top:30px}.program-card h3{font-family:'Noto Serif KR';font-size:24px;margin:6px 0 10px}.program-card p{color:var(--muted)}.program-card .tag{position:absolute;right:22px;top:22px;font-size:9px;letter-spacing:.12em;color:var(--green);border:1px solid #ccd7cf;padding:5px 9px;border-radius:999px}.journey{background:linear-gradient(135deg,#153a31,#285447)}.timeline{list-style:none;padding:0;margin:60px 0 0;display:grid;grid-template-columns:repeat(4,1fr);position:relative}.timeline:before{content:"";position:absolute;top:30px;left:12%;right:12%;height:1px;background:rgba(255,255,255,.24)}.timeline li{text-align:center;position:relative}.timeline>li>span{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;background:var(--gold);color:var(--green);font-family:'Noto Serif KR';font-weight:700;margin:0 auto 18px}.timeline strong,.timeline small{display:block}.timeline strong{font-size:17px}.timeline small{color:rgba(255,255,255,.6);margin-top:3px}.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:240px;gap:18px}.gallery-item{margin:0;position:relative;overflow:hidden;border-radius:24px;background:#ddd}.gallery-item.large{grid-column:span 2;grid-row:span 2}.gallery-item figcaption{position:absolute;left:18px;bottom:15px;color:#fff;font-weight:600;text-shadow:0 2px 12px rgba(0,0,0,.5)}.scene{width:100%;height:100%;transition:.6s}.gallery-item:hover .scene{transform:scale(1.05)}.scene-forest{background:linear-gradient(rgba(15,50,40,.18),rgba(15,50,40,.6)),radial-gradient(circle at 75% 22%,#efd195 0 7%,transparent 8%),linear-gradient(135deg,#9bb792,#274d3f 72%)}.scene-barrel{background:radial-gradient(ellipse at 50% 70%,#d8aa6a 0 23%,#a46b3d 24% 37%,#4f3323 38% 42%,transparent 43%),linear-gradient(#c9d9bf,#577b64)}.scene-tea{background:radial-gradient(circle at 52% 60%,#e7d5aa 0 12%,#80532f 13% 18%,transparent 19%),linear-gradient(145deg,#7a9a83,#ede5cc)}.scene-walk{background:linear-gradient(120deg,transparent 45%,#d9caa5 46% 52%,transparent 53%),linear-gradient(145deg,#21483a,#95ad8b)}.scene-food{background:radial-gradient(circle at 50% 50%,#f0e2bc 0 29%,#80674a 30% 34%,transparent 35%),linear-gradient(145deg,#d8d2b3,#71876b)}.reviews{background:#f0f1e9}.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.review-grid blockquote{margin:0;background:#fff;padding:34px;border-radius:22px;font-family:'Noto Serif KR';font-size:20px;line-height:1.8;box-shadow:0 10px 34px rgba(19,54,44,.06)}.review-grid cite{display:block;font-family:'Noto Sans KR';font-size:12px;color:var(--muted);font-style:normal;margin-top:20px}.review-note{text-align:center;font-size:12px;color:var(--muted);margin-top:24px}.visit-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:80px;align-items:center}.visit-copy dl{margin:36px 0}.visit-copy dl div{display:grid;grid-template-columns:100px 1fr;padding:16px 0;border-top:1px solid var(--line)}.visit-copy dt{font-weight:700}.visit-copy dd{margin:0;color:var(--muted)}.map-card{height:500px;border-radius:30px;overflow:hidden;position:relative;background:#dfe7dc;box-shadow:var(--shadow)}.map-pattern{position:absolute;inset:0;background:linear-gradient(30deg,transparent 45%,rgba(255,255,255,.8) 46% 51%,transparent 52%),linear-gradient(120deg,transparent 38%,rgba(255,255,255,.75) 39% 44%,transparent 45%),radial-gradient(circle at 65% 40%,#93af94 0 18%,transparent 19%),#dce4d7;background-size:180px 180px,220px 220px,100% 100%,auto}.map-pin{position:absolute;left:58%;top:43%;transform:translate(-50%,-50%);width:56px;height:56px;background:var(--green);border:8px solid #fff;border-radius:50%;color:var(--gold);display:grid;place-items:center;box-shadow:0 10px 28px rgba(0,0,0,.18)}.map-label{position:absolute;left:30px;right:30px;bottom:26px;background:rgba(255,255,255,.92);padding:18px 20px;border-radius:16px}.map-label strong,.map-label span{display:block}.map-label span{font-size:12px;color:var(--muted)}.cta-section{background:linear-gradient(120deg,#173f35,#315f4f)}.cta-inner{display:flex;justify-content:space-between;gap:40px;align-items:center}.cta-inner h2{font-size:42px}.cta-inner p{color:rgba(255,255,255,.7)}.site-footer{background:#102f27;color:#fff;padding:70px 0 26px}.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:50px}.footer-grid strong{font-family:'Noto Serif KR';font-size:18px}.footer-grid p{color:rgba(255,255,255,.6);font-size:13px}.footer-bottom{border-top:1px solid rgba(255,255,255,.15);margin-top:45px;padding-top:20px;display:flex;justify-content:space-between;color:rgba(255,255,255,.45);font-size:11px}.floating-actions{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:80}.floating-actions a{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:var(--gold);color:var(--green);font-size:13px;font-weight:800;box-shadow:0 10px 24px rgba(0,0,0,.18)}.floating-actions a:first-child{background:var(--green);color:#fff}.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}.reveal.visible{opacity:1;transform:none}
@media(max-width:960px){.main-nav{position:fixed;top:84px;left:0;right:0;background:var(--paper);padding:26px 20px;display:none;flex-direction:column;align-items:stretch;border-bottom:1px solid var(--line)}.main-nav.open{display:flex}.menu-toggle{display:block}.hero{min-height:820px}.two-col,.feature-grid,.visit-grid{grid-template-columns:1fr;gap:50px}.card-grid{grid-template-columns:repeat(2,1fr)}.gallery-grid{grid-template-columns:repeat(2,1fr)}.review-grid{grid-template-columns:1fr}.cta-inner{flex-direction:column;align-items:flex-start}.footer-grid{grid-template-columns:1fr 1fr}.footer-brand{grid-column:1/-1}}
@media(max-width:640px){.container{width:min(100% - 28px,1180px)}.header-inner{height:72px}.brand strong{font-size:16px}.brand small{font-size:7px}.brand-mark{width:38px;height:38px}.main-nav{top:72px}.section{padding:82px 0}.hero{min-height:760px}.hero-content{padding-top:100px}.hero h1{font-size:48px}.hero-copy{font-size:15px}.hero-points{display:grid;grid-template-columns:1fr 1fr;margin-top:44px}.hero-points li{padding-top:16px}.two-col{gap:24px}.section-heading h2,.feature-copy h2,.visit-copy h2{font-size:38px}.card-grid{grid-template-columns:1fr}.program-card{min-height:auto}.timeline{grid-template-columns:1fr 1fr;gap:34px 10px}.timeline:before{display:none}.gallery-grid{grid-auto-rows:190px}.gallery-item.large{grid-column:1/-1;grid-row:span 1}.visit-copy dl div{grid-template-columns:78px 1fr}.map-card{height:370px}.cta-inner h2{font-size:34px}.footer-grid{grid-template-columns:1fr}.footer-brand{grid-column:auto}.footer-bottom{flex-direction:column;gap:5px}.floating-actions{right:14px;bottom:14px}}

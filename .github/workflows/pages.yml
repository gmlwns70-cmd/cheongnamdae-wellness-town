name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify public review page
        run: |
          set -euo pipefail
          base="${{ steps.deployment.outputs.page_url }}"
          base="${base%/}"
          sleep 45
          curl -fsSL "$base/review.html" -o review.html
          grep -q "오늘의 힐링은 어떠셨나요" review.html
          grep -q "네이버에서 후기 남기기" review.html
          grep -q "구글에서 후기 남기기" review.html
          curl -fsSL "$base/review/" -o review-folder.html
          grep -q "방문 후기 남기기" review-folder.html
          curl -fsSL "$base/assets/js/config.js" -o config.js
          grep -q "NAVER_REVIEW_URL" config.js
          grep -q "GOOGLE_REVIEW_URL" config.js
          curl -fsSL "$base/" -o index.html
          grep -q "청남대 웰니스타운" index.html
